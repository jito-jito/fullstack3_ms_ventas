# =======================================================
# CONFIGURACIÓN PARA PRUEBAS (PERFIL: test)
# =======================================================
# Se usa H2 (base de datos en memoria) para las pruebas
# para evitar dependencia de Oracle Cloud durante testing

# Base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA/Hibernate para H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Configuración del puerto para pruebas
server.port=0